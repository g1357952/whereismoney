<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>甜蜜生活與兔兔記帳本</title>

    <!-- iOS「加入主畫面」專屬萌萌兔 APP 圖示 (取代 iOS 預設寫實兔子) -->
    <link rel="apple-touch-icon" id="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180' width='180' height='180'><rect width='180' height='180' rx='40' fill='%23d1fae5'/><circle cx='90' cy='90' r='72' fill='%23a7f3d0'/><path d='M 62,90 C 42,20 78,15 78,85' fill='%23f3f4f6' stroke='%23d1d5db' stroke-width='2'/><path d='M 65,85 C 52,32 73,28 74,82' fill='%23fbcfe8'/><path d='M 118,90 C 138,20 102,15 102,85' fill='%23f3f4f6' stroke='%23d1d5db' stroke-width='2'/><path d='M 115,85 C 128,32 107,28 106,82' fill='%23fbcfe8'/><ellipse cx='90' cy='115' rx='46' ry='38' fill='%23ffffff'/><ellipse cx='65' cy='120' rx='8' ry='5' fill='%23fbcfe8' opacity='0.6'/><ellipse cx='115' cy='120' rx='8' ry='5' fill='%23fbcfe8' opacity='0.6'/><ellipse cx='72' cy='108' rx='4.5' ry='6.5' fill='%231f2937'/><circle cx='70.5' cy='106' r='1.8' fill='%23ffffff'/><ellipse cx='108' cy='108' rx='4.5' ry='6.5' fill='%231f2937'/><circle cx='106.5' cy='106' r='1.8' fill='%23ffffff'/><polygon points='90,115 85,110 95,110' fill='%23f43f5e'/><path d='M 83,119 Q 90,126 90,119 Q 90,126 97,119' fill='none' stroke='%23374151' stroke-width='2.5' stroke-linecap='round'/><line x1='52' y1='112' x2='36' y2='108' stroke='%239ca3af' stroke-width='2' stroke-linecap='round'/><line x1='50' y1='117' x2='34' y2='117' stroke='%239ca3af' stroke-width='2' stroke-linecap='round'/><line x1='52' y1='122' x2='36' y2='126' stroke='%239ca3af' stroke-width='2' stroke-linecap='round'/><line x1='128' y1='112' x2='144' y2='108' stroke='%239ca3af' stroke-width='2' stroke-linecap='round'/><line x1='130' y1='117' x2='146' y2='117' stroke='%239ca3af' stroke-width='2' stroke-linecap='round'/><line x1='128' y1='122' x2='144' y2='126' stroke='%239ca3af' stroke-width='2' stroke-linecap='round'/></svg>">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180' width='180' height='180'><rect width='180' height='180' rx='40' fill='%23d1fae5'/><circle cx='90' cy='90' r='72' fill='%23a7f3d0'/><path d='M 62,90 C 42,20 78,15 78,85' fill='%23f3f4f6' stroke='%23d1d5db' stroke-width='2'/><path d='M 65,85 C 52,32 73,28 74,82' fill='%23fbcfe8'/><path d='M 118,90 C 138,20 102,15 102,85' fill='%23f3f4f6' stroke='%23d1d5db' stroke-width='2'/><path d='M 115,85 C 128,32 107,28 106,82' fill='%23fbcfe8'/><ellipse cx='90' cy='115' rx='46' ry='38' fill='%23ffffff'/><ellipse cx='65' cy='120' rx='8' ry='5' fill='%23fbcfe8' opacity='0.6'/><ellipse cx='115' cy='120' rx='8' ry='5' fill='%23fbcfe8' opacity='0.6'/><ellipse cx='72' cy='108' rx='4.5' ry='6.5' fill='%231f2937'/><circle cx='70.5' cy='106' r='1.8' fill='%23ffffff'/><ellipse cx='108' cy='108' rx='4.5' ry='6.5' fill='%231f2937'/><circle cx='106.5' cy='106' r='1.8' fill='%23ffffff'/><polygon points='90,115 85,110 95,110' fill='%23f43f5e'/><path d='M 83,119 Q 90,126 90,119 Q 90,126 97,119' fill='none' stroke='%23374151' stroke-width='2.5' stroke-linecap='round'/><line x1='52' y1='112' x2='36' y2='108' stroke='%239ca3af' stroke-width='2' stroke-linecap='round'/><line x1='50' y1='117' x2='34' y2='117' stroke='%239ca3af' stroke-width='2' stroke-linecap='round'/><line x1='52' y1='122' x2='36' y2='126' stroke='%239ca3af' stroke-width='2' stroke-linecap='round'/><line x1='128' y1='112' x2='144' y2='108' stroke='%239ca3af' stroke-width='2' stroke-linecap='round'/><line x1='130' y1='117' x2='146' y2='117' stroke='%239ca3af' stroke-width='2' stroke-linecap='round'/><line x1='128' y1='122' x2='144' y2='126' stroke='%239ca3af' stroke-width='2' stroke-linecap='round'/></svg>">

    <!-- Tailwind CSS for modern premium UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for high quality visuals -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel for robust, reactive and component-based structure in a single file -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        html { -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-16">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // 公用且安全的雲端同步儲存庫端點 (免 API 金鑰)
        const CLOUD_STORAGE_PREFIX = 'https://kvdb.io/C9uX7W2p3T8R5y1M4a6B/ledger-';

        const DEFAULT_CATEGORIES = {
            couple: {
                expense: ['超市買菜', '外食餐飲', '日常用品', '居家生活', '飲料零食', '休閒娛樂', '其他支出'],
                income: ['公積金存入', '發票中獎', '其他收入']
            },
            rabbit: {
                expense: ['牧草飼料', '鮮食零食', '醫療保健', '墊材用品', '玩具娛樂', '美容沙龍', '其他開銷'],
                income: ['兔兔紅包', '其他收入']
            }
        };

        function App() {
            // 基礎資料庫狀態
            const [transactions, setTransactions] = useState([]);
            const [deletedIds, setDeletedIds] = useState([]); // 追蹤被刪除的ID，避免雲端同步時被重新覆蓋

            // 同步設定
            const [syncKey, setSyncKey] = useState(() => localStorage.getItem('rabbit_sync_key') || '');
            const [syncStatus, setSyncStatus] = useState('local'); // local, syncing, synced, error

            // UI 狀態
            const [activeAccount, setActiveAccount] = useState('all'); // all, couple, rabbit
            const [selectedMonth, setSelectedMonth] = useState(() => new Date().toISOString().substring(0, 7));
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isSyncModalOpen, setIsSyncModalOpen] = useState(false);
            const [activePhoto, setActivePhoto] = useState(null);
            
            // 客製化通知訊息狀態
            const [alertData, setAlertData] = useState(null);

            // 表單狀態
            const [formAccount, setFormAccount] = useState('couple');
            const [formType, setFormType] = useState('expense');
            const [formCategory, setFormCategory] = useState(DEFAULT_CATEGORIES.couple.expense[0]);
            const [formAmount, setFormAmount] = useState('');
            const [formDate, setFormDate] = useState(() => new Date().toISOString().split('T')[0]);
            const [formNote, setFormNote] = useState('');
            const [formImage, setFormImage] = useState(null);

            // 1. 初始載入：從手機本機快取恢復資料
            useEffect(() => {
                // 動態將 SVG 繪製至 Canvas 轉為超高畫質 PNG，確保 iOS Safari 加入主畫面時 100% 呈現可愛卡通兔
                const generateAppleTouchIcon = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 180;
                    canvas.height = 180;
                    const ctx = canvas.getContext('2d');
                    
                    ctx.fillStyle = '#d1fae5';
                    ctx.beginPath();
                    ctx.roundRect(0, 0, 180, 180, 40);
                    ctx.fill();

                    ctx.fillStyle = '#a7f3d0';
                    ctx.beginPath();
                    ctx.arc(90, 90, 72, 0, Math.PI * 2);
                    ctx.fill();

                    const img = new Image();
                    const svgBlob = new Blob([`
                        <svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
                            <path d="M 62,90 C 42,20 78,15 78,85" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
                            <path d="M 65,85 C 52,32 73,28 74,82" fill="#fbcfe8"/>
                            <path d="M 118,90 C 138,20 102,15 102,85" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
                            <path d="M 115,85 C 128,32 107,28 106,82" fill="#fbcfe8"/>
                            <ellipse cx="90" cy="115" rx="46" ry="38" fill="#ffffff"/>
                            <ellipse cx="65" cy="120" rx="8" ry="5" fill="#fbcfe8" opacity="0.6"/>
                            <ellipse cx="115" cy="120" rx="8" ry="5" fill="#fbcfe8" opacity="0.6"/>
                            <ellipse cx="72" cy="108" rx="4.5" ry="6.5" fill="#1f2937"/>
                            <circle cx="70.5" cy="106" r="1.8" fill="#ffffff"/>
                            <ellipse cx="108" cy="108" rx="4.5" ry="6.5" fill="#1f2937"/>
                            <circle cx="106.5" cy="106" r="1.8" fill="#ffffff"/>
                            <polygon points="90,115 85,110 95,110" fill="#f43f5e"/>
                            <path d="M 83,119 Q 90,126 90,119 Q 90,126 97,119" fill="none" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
                            <line x1="52" y1="112" x2="36" y2="108" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
                            <line x1="50" y1="117" x2="34" y2="117" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
                            <line x1="52" y1="122" x2="36" y2="126" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
                            <line x1="128" y1="112" x2="144" y2="108" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
                            <line x1="130" y1="117" x2="146" y2="117" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
                            <line x1="128" y1="122" x2="144" y2="126" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    `], {type: 'image/svg+xml;charset=utf-8'});
                    const url = URL.createObjectURL(svgBlob);
                    img.onload = () => {
                        ctx.drawImage(img, 0, 0);
                        const pngUrl = canvas.toDataURL('image/png');
                        
                        let touchIcon = document.querySelector("link[rel='apple-touch-icon']");
                        if (!touchIcon) {
                            touchIcon = document.createElement('link');
                            touchIcon.rel = 'apple-touch-icon';
                            document.head.appendChild(touchIcon);
                        }
                        touchIcon.href = pngUrl;
                        URL.revokeObjectURL(url);
                    };
                    img.src = url;
                };
                generateAppleTouchIcon();

                const localData = localStorage.getItem('rabbit_ledger_data');
                const localDeletes = localStorage.getItem('rabbit_ledger_deletes');
                if (localData) {
                    try { setTransactions(JSON.parse(localData)); } catch(e) {}
                } else {
                    // 預設給予一筆可愛的示範資料
                    setTransactions([
                        {
                            id: 'demo-1',
                            accountId: 'couple',
                            type: 'expense',
                            category: '超市買菜',
                            amount: 1250,
                            date: new Date().toISOString().split('T')[0],
                            note: '家樂福買晚餐食材、蔬菜與鮮奶',
                            image: null
                        },
                        {
                            id: 'demo-2',
                            accountId: 'rabbit',
                            type: 'expense',
                            category: '牧草飼料',
                            amount: 650,
                            date: new Date().toISOString().split('T')[0],
                            note: '提摩西一割牧草 + 兔子營養飼料',
                            image: null
                        }
                    ]);
                }
                if (localDeletes) {
                    try { setDeletedIds(JSON.parse(localDeletes)); } catch(e) {}
                }
            }, []);

            // 2. 本機儲存同步
            const saveToLocal = (updatedTxs, updatedDeletes) => {
                setTransactions(updatedTxs);
                setDeletedIds(updatedDeletes);
                localStorage.setItem('rabbit_ledger_data', JSON.stringify(updatedTxs));
                localStorage.setItem('rabbit_ledger_deletes', JSON.stringify(updatedDeletes));
            };

            // 3. ✨ 雲端即時合併與同步核心引擎 ✨
            const syncData = async (currentKey) => {
                if (!currentKey) return;
                setSyncStatus('syncing');
                try {
                    const response = await fetch(`${CLOUD_STORAGE_PREFIX}${currentKey}`);
                    
                    if (response.status === 404 || response.status === 444) {
                        // 雲端尚無資料，直接將本機資料推上雲端建立初始版本
                        await pushToCloud(currentKey, transactions, deletedIds);
                        setSyncStatus('synced');
                        return;
                    }

                    const cloudPayload = await response.json();
                    const cloudTxs = cloudPayload.transactions || [];
                    const cloudDeletes = cloudPayload.deletedIds || [];

                    // 執行雙向無痛合併 (Smart Merge)
                    const mergedDeletes = Array.from(new Set([...deletedIds, ...cloudDeletes]));
                    
                    const txMap = {};
                    // A. 先載入雲端資料
                    cloudTxs.forEach(tx => {
                        if (!mergedDeletes.includes(tx.id)) txMap[tx.id] = tx;
                    });
                    // B. 再載入本機資料 (本地優先覆蓋，保留最新更新)
                    transactions.forEach(tx => {
                        if (!mergedDeletes.includes(tx.id)) txMap[tx.id] = tx;
                    });

                    const mergedTxs = Object.values(txMap);
                    // 日期降冪排序
                    mergedTxs.sort((a, b) => b.date.localeCompare(a.date));

                    // 儲存至本機
                    saveToLocal(mergedTxs, mergedDeletes);

                    // 同步寫回雲端，確保雙方完美一致
                    await pushToCloud(currentKey, mergedTxs, mergedDeletes);
                    setSyncStatus('synced');
                } catch (error) {
                    console.error("雲端同步失敗: ", error);
                    setSyncStatus('error');
                }
            };

            const pushToCloud = async (key, txs, deletes) => {
                await fetch(`${CLOUD_STORAGE_PREFIX}${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ transactions: txs, deletedIds: deletes })
                });
            };

            // 當金鑰設定好時，啟動定時輪詢 (每 8 秒自動背景靜態同步)
            useEffect(() => {
                if (!syncKey) {
                    setSyncStatus('local');
                    return;
                }
                
                // 立即進行一次同步
                syncData(syncKey);

                const timer = setInterval(() => {
                    syncData(syncKey);
                }, 8000);

                return () => clearInterval(timer);
            }, [syncKey, transactions, deletedIds]);

            // 解析圖示
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [transactions, syncStatus, isAddModalOpen, isSyncModalOpen, activePhoto, alertData]);

            // 表單關聯重設
            const handleFormAccountOrTypeChange = (acc, type) => {
                setFormAccount(acc);
                setFormType(type);
                setFormCategory(DEFAULT_CATEGORIES[acc][type][0]);
            };

            // 圖片高階壓縮 (壓縮至 50% 確保 Base64 檔案小於 30KB，大幅加快雲端同步速度)
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const img = new Image();
                        img.src = reader.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 400; // 手機檢視極佳的大小
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > MAX_SIZE) {
                                    height *= MAX_SIZE / width;
                                    width = MAX_SIZE;
                                }
                            } else {
                                if (height > MAX_SIZE) {
                                    width *= MAX_SIZE / height;
                                    height = MAX_SIZE;
                                }
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            // 壓縮為 50% 的 JPEG 格式
                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5);
                            setFormImage(compressedBase64);
                        };
                    };
                    reader.readAsDataURL(file);
                }
            };

            // 新增記帳明細
            const handleAddTransaction = async (e) => {
                e.preventDefault();
                const amount = parseFloat(formAmount);
                if (isNaN(amount) || amount <= 0) {
                    showCustomAlert('金額輸入錯誤', '請填寫正確且大於 0 的金額！');
                    return;
                }

                const newTx = {
                    id: 'tx-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
                    accountId: formAccount,
                    type: formType,
                    category: formCategory,
                    amount: amount,
                    date: formDate,
                    note: formNote,
                    image: formImage
                };

                const updatedTxs = [newTx, ...transactions];
                saveToLocal(updatedTxs, deletedIds);

                // 關閉 Modal 並重置
                setIsAddModalOpen(false);
                setFormAmount('');
                setFormNote('');
                setFormImage(null);
                setSelectedMonth(formDate.substring(0, 7));

                // 觸發即時雲端同步
                if (syncKey) {
                    await pushToCloud(syncKey, updatedTxs, deletedIds);
                    syncData(syncKey);
                }
            };

            // 刪除記帳明細
            const handleDelete = async (id) => {
                const updatedTxs = transactions.filter(t => t.id !== id);
                const updatedDeletes = [...deletedIds, id];
                saveToLocal(updatedTxs, updatedDeletes);

                // 觸發即時雲端同步
                if (syncKey) {
                    await pushToCloud(syncKey, updatedTxs, updatedDeletes);
                    syncData(syncKey);
                }
            };

            // 儲存同步密鑰
            const handleSaveSyncKey = (e) => {
                e.preventDefault();
                const rawKey = e.target.syncKeyInput.value.trim();
                if (!rawKey) {
                    showCustomAlert('欄位未填寫', '請輸入自訂的雙人暗號。');
                    return;
                }
                setSyncKey(rawKey);
                localStorage.setItem('rabbit_sync_key', rawKey);
                setIsSyncModalOpen(false);
                showCustomAlert('設定成功', '雲端同步密鑰已啟用！資料已開始即時雙向連線！');
            };

            const handleDisableSync = () => {
                setSyncKey('');
                localStorage.removeItem('rabbit_sync_key');
                setIsSyncModalOpen(false);
                showCustomAlert('切換成功', '已恢復為單機模式儲存。');
            };

            // 複製分享暗號
            const handleCopyShareKey = () => {
                const textarea = document.createElement('textarea');
                textarea.value = syncKey;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    showCustomAlert('已複製', '暗號已複製到您的剪貼簿！可直接傳給女友設定！');
                } catch (err) {
                    console.error('複製失敗:', err);
                }
                document.body.removeChild(textarea);
            };

            // 動態篩選有資料的月份
            const monthOptions = useMemo(() => {
                const months = transactions.map(t => t.date.substring(0, 7));
                const unique = Array.from(new Set(months));
                const current = new Date().toISOString().substring(0, 7);
                if (!unique.includes(current)) unique.push(current);
                return unique.sort((a, b) => b.localeCompare(a));
            }, [transactions]);

            // 篩選出當下月份與帳戶的交易
            const filteredTransactions = useMemo(() => {
                return transactions.filter(t => {
                    const matchAcc = activeAccount === 'all' || t.accountId === activeAccount;
                    const matchMonth = t.date.substring(0, 7) === selectedMonth;
                    return matchAcc && matchMonth;
                });
            }, [transactions, activeAccount, selectedMonth]);

            // 財務統計
            const stats = useMemo(() => {
                let income = 0;
                let expense = 0;
                filteredTransactions.forEach(t => {
                    if (t.type === 'income') income += t.amount;
                    else expense += t.amount;
                });
                return { income, expense, balance: income - expense };
            }, [filteredTransactions]);

            // 分類支出佔比統計
            const categoryStats = useMemo(() => {
                const map = {};
                let totalExp = 0;
                filteredTransactions.filter(t => t.type === 'expense').forEach(t => {
                    map[t.category] = (map[t.category] || 0) + t.amount;
                    totalExp += t.amount;
                });
                return Object.keys(map).map(name => ({
                    name,
                    amount: map[name],
                    percentage: totalExp > 0 ? Math.round((map[name] / totalExp) * 100) : 0
                })).sort((a, b) => b.amount - a.amount);
            }, [filteredTransactions]);

            // 輔助通知訊息視窗
            const showCustomAlert = (title, msg) => {
                setAlertData({ title, msg });
            };

            return (
                <div className="pb-12">
                    {/* 自訂通知 Modal */}
                    {alertData && (
                        <div className="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl max-w-xs w-full p-6 text-center shadow-2xl animate-scale-up">
                                <div className="w-12 h-12 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-3">
                                    <i data-lucide="info" className="w-6 h-6"></i>
                                </div>
                                <h4 className="font-bold text-slate-900 mb-1">{alertData.title}</h4>
                                <p className="text-xs text-slate-500 leading-relaxed mb-4">{alertData.msg}</p>
                                <button 
                                    onClick={() => setAlertData(null)}
                                    className="w-full bg-slate-900 text-white text-xs font-bold py-2 rounded-xl active:bg-slate-800 transition"
                                >
                                    好的
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 頂部導覽列 */}

                                                className="w-full px-3 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-rose-500 focus:outline-none font-mono font-bold text-xs"
                                            />
                                        </div>
                                        <button type="submit" className="w-full bg-slate-900 active:bg-slate-800 text-white font-bold py-2 rounded-xl transition">
                                            確認設定並啟用同步 ➔
                                        </button>
                                    </form>

                                    {syncKey && (
                                        <button 
                                            onClick={handleDisableSync}
                                            className="w-full text-center text-[10px] text-slate-400 hover:text-slate-500 underline"
                                        >
                                            取消雲端同步，恢復為本機單機模式
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 照片燈箱 */}
                    {activePhoto && (
                        <div className="fixed inset-0 bg-slate-950/95 z-50 flex items-center justify-center p-4" onClick={() => setActivePhoto(null)}>
                            <div className="relative max-w-sm w-full">
                                <button className="absolute -top-10 right-0 text-white text-xs bg-white/20 px-3 py-1 rounded-full flex items-center gap-1">
                                    <i data-lucide="x" className="w-3.5 h-3.5"></i>
                                    <span>關閉</span>
                                </button>
                                <img src={activePhoto} className="w-full max-h-[70vh] object-contain rounded-2xl shadow-2xl" />
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
